<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click to Download</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #121212; /* Clean dark theme */
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Makes the link fill the whole screen so they can click anywhere */
        .download-link {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            color: #00adb5;
            font-size: 28px;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.2s ease;
        }

        .download-link:hover {
            color: #00fff2;
        }
    </style>
</head>
<body>

    <a href="sound.mp3" download="awesome-sound.mp3" class="download-link">
        Click anywhere to download the audio file
    </a>

</body>
</html>
